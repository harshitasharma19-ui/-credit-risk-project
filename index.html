<!DOCTYPE html>
<html>
<head>
    <title>Credit Risk Predictor</title>
</head>

<body style="text-align:center; margin-top:50px;">

<h2>Credit Risk Prediction</h2>

<input id="age" placeholder="Enter Age"><br><br>
<input id="income" placeholder="Enter Income"><br><br>

<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<h3>Confusion Matrix</h3>
<img src="confusion_matrix.png" width="300">

<script>
function predict() {
    let age = parseFloat(document.getElementById("age").value);
    let income = parseFloat(document.getElementById("income").value);

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({features: [age, income]})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            data.prediction == 1 
            ? "High Risk (" + (data.probability*100).toFixed(2) + "%)"
            : "Low Risk (" + (data.probability*100).toFixed(2) + "%)";
    });
}
</script>

</body>
</html>
